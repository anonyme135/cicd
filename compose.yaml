services:
  jenkins:
    build:
      context: .
      dockerfile_inline: |
        FROM jenkins/jenkins:2.568-jdk21
        USER root
        RUN apt-get update && apt-get install -y --no-install-recommends docker.io && rm -rf /var/lib/apt/lists/*
        USER jenkins
        RUN jenkins-plugin-cli --plugins workflow-aggregator git docker-workflow
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ci

  agent1:
    image: jenkins/agent:latest-jdk21
    container_name: jenkins-agent-1
    command: sleep infinity
    networks:
      - ci

  agent2:
    image: jenkins/agent:latest-jdk21
    container_name: jenkins-agent-2
    command: sleep infinity
    networks:
      - ci

  jenkins-cli:
    image: jenkins/jenkins:2.568-jdk21
    container_name: jenkins-cli
    profiles:
      - tools
    entrypoint: sleep
    command: infinity
    networks:
      - ci

  ssh-agent:
    image: jenkins/ssh-agent:8.5.0-jdk21
    container_name: jenkins-ssh-agent
    environment:
      JENKINS_AGENT_SSH_PUBKEY: ${JENKINS_AGENT_SSH_PUBKEY}
    networks:
      - ci

  registry:
    image: registry:3
    container_name: registry
    ports:
      - "5000:5000"
    networks:
      - ci

volumes:
  jenkins_home:

networks:
  ci:
