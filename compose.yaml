services:
  jenkins:
    build:
      context: .
      dockerfile_inline: |
        FROM jenkins/jenkins:2.568
        RUN jenkins-plugin-cli --plugins workflow-aggregator git docker-workflow
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - ci

volumes:
  jenkins_home:

networks:
  ci: