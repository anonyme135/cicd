services:
  jenkins:
    build:
      context: .
      dockerfile_inline: |
        FROM jenkins/jenkins:2.568-jdk21
        RUN jenkins-plugin-cli --plugins workflow-aggregator git docker-workflow
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - ci

  agent1:
    image: jenkins/agent:latest-jdk21
    container_name: jenkins-agent-1
    command: sleep infinity
    networks:
      - ci

  agent2:
    image: jenkins/agent:latest-jdk21
    container_name: jenkins-agent-2
    command: sleep infinity
    networks:
      - ci

  jenkins-cli:
    image: jenkins/jenkins:2.568-jdk21
    container_name: jenkins-cli
    profiles:
      - tools
    entrypoint: sleep
    command: infinity
    networks:
      - ci

  ssh-agent:
    image: jenkins/ssh-agent:8.5.0-jdk21
    container_name: jenkins-ssh-agent
    environment:
      JENKINS_AGENT_SSH_PUBKEY: ${JENKINS_AGENT_SSH_PUBKEY}
    networks:
      - ci

volumes:
  jenkins_home:

networks:
  ci: